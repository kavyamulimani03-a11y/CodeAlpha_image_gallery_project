<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>My Image Gallery</h1>

<div class="gallery">
<img src="https://picsum.photos/id/1015/300/200" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1016/300/200" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1018/300/200" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1020/300/200" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1024/300/200" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1035/300/200" onclick="openLightbox(this)">
</div>

<div id="lightbox">
<span class="close" onclick="closeLightbox()">×</span>
<img id="lightbox-img">
<button onclick="prevImage()">❮</button>
<button onclick="nextImage()">❯</button>
</div>

<script src="script.js"></script>

</body>
</html>
